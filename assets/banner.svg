<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10" />
      <stop offset="50%" stop-color="#12131c" />
      <stop offset="100%" stop-color="#07080c" />
    </linearGradient>

    <!-- Glowing Blue Gradient -->
    <linearGradient id="blue-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Glowing Purple Gradient -->
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b92b27" />
      <stop offset="100%" stop-color="#1565C0" />
    </linearGradient>

    <linearGradient id="agent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f093fb" />
      <stop offset="100%" stop-color="#f5576c" />
    </linearGradient>

    <!-- Filters for Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-subtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0% { r: 10px; opacity: 0.6; }
      50% { r: 18px; opacity: 0.9; filter: url(#glow); }
      100% { r: 10px; opacity: 0.6; }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    @keyframes gradient-x {
      0% { stop-color: #00f2fe; }
      50% { stop-color: #9b51e0; }
      100% { stop-color: #00f2fe; }
    }
    .node-hub {
      animation: pulse 4s infinite ease-in-out;
    }
    .connection-line {
      stroke-dasharray: 8, 12;
      animation: dash 2s linear infinite;
    }
    .title-text {
      font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      fill: #ffffff;
      font-size: 46px;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      fill: #a0aec0;
      font-size: 18px;
      letter-spacing: 4px;
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />

  <!-- Grid Pattern Overlay for Tech Aesthetic -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" />
  </g>

  <!-- Constellation / Agent Network Graphic on Left & Right -->
  <!-- Left Network -->
  <g stroke="#4facfe" stroke-width="1.5" stroke-opacity="0.3">
    <line x1="80" y1="100" x2="180" y2="150" class="connection-line" />
    <line x1="180" y1="150" x2="120" y2="280" class="connection-line" stroke="#9b51e0" />
    <line x1="120" y1="280" x2="80" y2="100" />
    <line x1="180" y1="150" x2="280" y2="200" class="connection-line" />
    <line x1="280" y1="200" x2="220" y2="320" />
    <line x1="120" y1="280" x2="220" y2="320" class="connection-line" />
  </g>

  <!-- Left Nodes -->
  <circle cx="80" cy="100" r="6" fill="#00f2fe" filter="url(#glow-subtle)" />
  <circle cx="180" cy="150" r="10" fill="#9b51e0" class="node-hub" style="animation-delay: 0s;" />
  <circle cx="120" cy="280" r="8" fill="#f5576c" />
  <circle cx="280" cy="200" r="12" fill="#00f2fe" class="node-hub" style="animation-delay: 1.5s;" />
  <circle cx="220" cy="320" r="7" fill="#9b51e0" />

  <!-- Right Network -->
  <g stroke="#9b51e0" stroke-width="1.5" stroke-opacity="0.3">
    <line x1="1120" y1="100" x2="1020" y2="180" class="connection-line" />
    <line x1="1020" y1="180" x2="1080" y2="300" class="connection-line" stroke="#00f2fe" />
    <line x1="1080" y1="300" x2="1120" y2="100" />
    <line x1="1020" y1="180" x2="920" y2="120" class="connection-line" />
    <line x1="920" y1="120" x2="960" y2="280" />
    <line x1="1080" y1="300" x2="960" y2="280" class="connection-line" />
  </g>

  <!-- Right Nodes -->
  <circle cx="1120" cy="100" r="7" fill="#9b51e0" />
  <circle cx="1020" cy="180" r="12" fill="#00f2fe" class="node-hub" style="animation-delay: 0.7s;" />
  <circle cx="1080" cy="300" r="9" fill="#f5576c" />
  <circle cx="920" cy="120" r="10" fill="#9b51e0" class="node-hub" style="animation-delay: 2.2s;" />
  <circle cx="960" cy="280" r="6" fill="#00f2fe" filter="url(#glow-subtle)" />

  <!-- Central Header Text -->
  <g transform="translate(600, 190)" text-anchor="middle">
    <!-- Glowing behind title -->
    <text x="0" y="0" class="title-text" filter="url(#glow)" fill="#00f2fe" opacity="0.3">AGENT ORCHESTRATION</text>
    <text x="0" y="0" class="title-text">AGENT ORCHESTRATION</text>
    <text x="0" y="45" class="subtitle-text">AUTONOMOUS MULTI-AGENT WORKFLOWS</text>
    
    <!-- Year Tag -->
    <rect x="-50" y="80" width="100" height="28" rx="14" fill="#1e2235" stroke="#4facfe" stroke-width="1.5" />
    <text x="0" y="99" font-family="'Inter', sans-serif" font-weight="700" font-size="14" fill="#00f2fe" letter-spacing="2px">2026</text>
  </g>
</svg>
